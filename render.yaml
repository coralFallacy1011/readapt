services:
  - type: web
    name: readapt-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # set to your Vercel URL
